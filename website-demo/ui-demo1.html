<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Demo · Direction 1 — Warm Stone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F0EDE6;font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;padding:32px}
.mac{width:1100px;height:700px;background:#F9F7F3;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);display:flex;flex-direction:column}
.titlebar{height:40px;background:#FCFAF6;border-bottom:1px solid #E6E0D6;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.traffic{display:flex;gap:7px}
.traffic span{width:11px;height:11px;border-radius:50%}
.traffic span:nth-child(1){background:#E55545}
.traffic span:nth-child(2){background:#E5A53B}
.traffic span:nth-child(3){background:#4CAF50}
.titlebar .brand{display:flex;align-items:center;gap:8px;margin-left:12px}
.titlebar .brand svg{width:15px;height:15px}
.titlebar .brand span{font-size:12.5px;font-weight:500;letter-spacing:-.2px;color:#1C1814}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:180px;background:#FCFAF6;border-right:1px solid #E6E0D6;padding:8px;flex-shrink:0}
.s-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:12.5px;font-weight:400;color:#8A847C;margin-bottom:2px;cursor:default}
.s-item.active{background:#E8E2D8;color:#1C1814;font-weight:500}
.s-item svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.5;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column}
.main-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;border-bottom:1px solid #EDE8E2}
.main-top h2{font-size:17px;font-weight:500;color:#1C1814;letter-spacing:-.3px}
.main-top .actions{display:flex;gap:8px}
.main-top .actions button{padding:7px 16px;border-radius:8px;font-size:11.5px;font-weight:500;border:none;cursor:default}
.main-top .actions .btn-pri{background:#C87A4A;color:#fff}
.main-top .actions .btn-sec{background:transparent;border:1px solid #E6E0D6;color:#6B6560}
.content{padding:20px 24px;overflow-y:auto;flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:#FFFFFF;border:1px solid #EDE8E2;border-radius:12px;padding:20px;cursor:default}
.card.wide{grid-column:1/-1}
.card h3{font-size:13px;font-weight:500;color:#1C1814;margin-bottom:4px}
.card p{font-size:11.5px;color:#8A847C;line-height:1.6}
.card .row{display:flex;gap:12px;margin-top:14px}
.card .field{flex:1}
.card .field label{display:block;font-size:10.5px;color:#8A847C;margin-bottom:4px}
.card .field .input{height:32px;background:#F7F5F0;border:1px solid #E6E0D6;border-radius:8px;padding:0 12px;font-size:12px;color:#1C1814;display:flex;align-items:center}
.card .badge{display:inline-flex;padding:3px 10px;border-radius:6px;font-size:10.5px;background:#F0EDE6;color:#6B6560;margin-right:4px;margin-top:6px}
.meta{font-size:10px;color:#B5ADA3;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.bottom-bar{height:32px;border-top:1px solid #EDE8E2;display:flex;align-items:center;padding:0 24px;font-size:10.5px;color:#B5ADA3;gap:16px;flex-shrink:0}
</style>
</head>
<body>
<div class="mac">
  <div class="titlebar">
    <div class="traffic"><span></span><span></span><span></span></div>
    <div class="brand"><svg viewBox="0 0 24 24" fill="none" stroke="#C87A4A" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><path d="M14 8v4"/><path d="M10 10h8"/></svg><span>ResumeForge</span></div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="s-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>概览</div>
      <div class="s-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>打造简历</div>
      <div class="s-item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>JD匹配</div>
      <div class="s-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>AI助手</div>
      <div class="s-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="3" y="15" width="7" height="6" rx="1"/><rect x="14" y="11" width="7" height="10" rx="1"/></svg>求职看板</div>
    </div>
    <div class="main">
      <div class="main-top"><h2>概览</h2><div class="actions"><button class="btn-sec">导入简历</button><button class="btn-pri">新建简历</button></div></div>
      <div class="content">
        <div class="card wide">
          <div class="meta">当前简历</div>
          <h3>产品经理_张明远_2026</h3>
          <p>上次编辑 · 2026年7月 · 3个版本</p>
          <div><span class="badge">ATS评分 86</span><span class="badge">叙事审计通过</span></div>
        </div>
        <div class="card"><div class="meta">投递统计</div><h3>24</h3><p>累计投递</p><div style="display:flex;gap:16px;margin-top:12px"><div><span style="font-size:15px;font-weight:500;color:#1C1814">8</span><span style="font-size:10px;color:#8A847C;display:block">面试</span></div><div><span style="font-size:15px;font-weight:500;color:#1C1814">2</span><span style="font-size:10px;color:#8A847C;display:block">Offer</span></div></div></div>
        <div class="card"><div class="meta">面试日历</div><h3>下一场</h3><p>字节跳动 · 7月20日 14:00</p></div>
      </div>
      <div class="bottom-bar"><span>v1.8.0</span><span>AI Ready</span></div>
    </div>
  </div>
</div>
<div style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1C1814;color:#fff;padding:8px 20px;border-radius:100px;font-size:12px;letter-spacing:.5px">方向一 · 暖石色系 — 深炭 + 陶土 + 米白</div>
</body>
</html>
