# ResumeForge Build & Release
#
# 推送 v* 标签时自动构建 Electron 桌面应用并发布到 GitHub Releases。
# 也可通过 workflow_dispatch 手动触发构建测试。
#
# 用法:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: electron-bin
          key: electron-bin-${{ runner.os }}-${{ hashFiles('node_modules/electron/package.json') }}
          restore-keys: |
            electron-bin-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Setup electron-bin cache
        shell: bash
        run: |
          if [ -d "electron-bin" ] && [ -f "electron-bin/electron.exe" ]; then
            echo "✓ electron-bin cache hit"
            cp -r electron-bin/* node_modules/electron/dist/
          else
            echo "Ensuring electron binary is downloaded..."
            node node_modules/electron/install.js
            mkdir -p electron-bin
            cp -r node_modules/electron/dist/* electron-bin/
            echo "✓ electron-bin ready"
          fi

      - name: Build app
        run: npm run build

      - name: Package NSIS installer
        run: npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ github.token }}

      - name: List release artifacts
        shell: pwsh
        run: |
          Write-Host "=== Release artifacts ==="
          if (Test-Path release/) {
            Get-ChildItem -Path release/ | ForEach-Object {
              Write-Host "  $($_.Name)  ($([math]::Round($_.Length / 1MB, 1)) MB)"
            }
          } else {
            Write-Host "  (none - release/ directory not found)"
          }

      - name: Clean up existing release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --json id &>/dev/null 2>&1; then
            echo "Release $TAG already exists — deleting and recreating"
            gh release delete "$TAG" --yes 2>/dev/null || true
          else
            echo "No existing release for $TAG — creating fresh"
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          generate_release_notes: true

      - name: Deploy to VPS
        if: startsWith(github.ref, 'refs/tags/')
        uses: appleboy/ssh-action@v1
        with:
          host: 124.221.92.130
          username: root
          password: ${{ secrets.VPS_PASS }}
          script: |
            VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            GH="https://ghproxy.net/https://github.com/hengtaoshi/resumeforge/releases/download/${{ github.ref_name }}"
            cd /www/wwwroot/resumeforge
            curl -sL --connect-timeout 10 --max-time 120 -o download/ResumeForge-${VER}-Setup.exe "$GH/ResumeForge-${VER}-Setup.exe"
            curl -sL --connect-timeout 10 --max-time 30 -o updates/latest.yml "$GH/latest.yml"
            curl -sL --connect-timeout 10 --max-time 30 -o updates/ResumeForge-${VER}-Setup.exe.blockmap "$GH/ResumeForge-${VER}-Setup.exe.blockmap"
            cp download/ResumeForge-${VER}-Setup.exe updates/
